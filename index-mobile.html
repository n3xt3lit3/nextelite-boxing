<script>
// l1ft0ff — Mission Constellation — mobile index
console.log('%c N3XT3LIT3 ', 'background: #1a1a1a; color: #CDDC39; font-size: 16px; font-weight: bold; padding: 8px 16px;');
console.log('%c mission constellation — mobile-native ', 'color: #888; font-size: 12px;');
console.log('%c five doors. one thumb. ', 'color: #D5D5D5; font-size: 10px;');

// Easter egg: tap all 5 links within 3 seconds
(function() {
  var links = document.querySelectorAll('.index-link');
  var tapped = new Set();
  var firstTapTime = null;

  links.forEach(function(link) {
    link.addEventListener('touchstart', function(e) {
      e.preventDefault();
      var id = link.getAttribute('data-id');

      if (tapped.size === 0) firstTapTime = Date.now();
      tapped.add(id);

      if (tapped.size === 5) {
        var elapsed = Date.now() - firstTapTime;
        if (elapsed <= 3000) {
          document.body.classList.add('flash');
          console.log('%c ACHIEVEMENT UNLOCKED ', 'background: #CDDC39; color: #1a1a1a; font-size: 14px; font-weight: bold; padding: 4px 12px;');
          console.log('%c five taps. glass speed. respect. ', 'color: #888; font-size: 11px;');
          setTimeout(function() { document.body.classList.remove('flash'); }, 500);
        }
        tapped.clear();
        firstTapTime = null;
      }

      // Navigate after brief delay
      setTimeout(function() {
        window.location.href = link.getAttribute('href');
      }, 150);
    }, { passive: false });
  });

  setInterval(function() {
    if (firstTapTime && Date.now() - firstTapTime > 3000) {
      tapped.clear();
      firstTapTime = null;
    }
  }, 500);
})();
</script>
